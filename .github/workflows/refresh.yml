name: Daily listings refresh

on:
  schedule:
    - cron: "0 6 * * *"   # 6am UTC
    - cron: "0 9 * * *"   # 9am UTC
    - cron: "0 13 * * *"  # 1pm UTC
    - cron: "0 17 * * *"  # 5pm UTC
    - cron: "0 21 * * *"  # 9pm UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Refresh listings
        id: scrape
        run: |
          output=$(python scripts/scrape.py)
          echo "$output"
          echo "summary=$output" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Listings refresh $(date -u +%H:%M) UTC — ${{ steps.scrape.outputs.summary }}"
            git push
          else
            echo "No changes since last refresh, skipping commit."
          fi
